<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRM ala Medium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell page-shell-login">
      <div class="login-card">
        <div class="text-center mb-5">
          <h1 class="brand-logo mb-3">Fatih's Blog.</h1>
          <h2 class="brand-title mb-3">Selamat datang kembali.</h2>
          <p class="brand-subtitle mb-0">login untuk melihat blog.</p>
        </div>

        <form action="dashboard.html" method="get" class="login-form">
          <div class="mb-4">
            <label for="email" class="form-label md-label">Email</label>
            <input type="email" id="email" name="email" class="form-control md-input" placeholder="nama@perusahaan.com" />
          </div>

          <div class="mb-4">
            <label for="password" class="form-label md-label">Kata Sandi</label>
            <input type="password" id="password" name="password" class="form-control md-input" placeholder="Masukkan kata sandi" />
          </div>

          <button type="submit" class="btn btn-dark md-pill-btn w-100">Masuk ke Dashboard</button>
        </form>
      </div>
    </main>
  </body>
</html>
